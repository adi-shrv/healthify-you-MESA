<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Google Accounts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f0f4f9;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-white border border-gray-200 rounded-lg shadow-sm max-w-[450px] w-full p-10 flex flex-col items-center">
    <!-- Google Logo -->
    <div class="mb-6">
      <svg class="w-10 h-10" viewBox="0 0 24 24" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.87-4.53-6.16-4.53z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
      </svg>
    </div>

    <!-- Title -->
    <h1 class="text-2xl text-gray-900 font-medium tracking-tight mb-2 text-center">Sign in with Google</h1>
    <p class="text-sm text-gray-600 mb-8 text-center">to continue to <span class="font-semibold text-gray-800">HealthifyYou</span></p>

    <!-- Account Selection Area -->
    <div class="w-full space-y-3 mb-6">
      <div class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Choose an account</div>
      
      <!-- Primary Mock Account (User's real email) -->
      <button onclick="selectAccount('Aditya Shreevatsav', 'adityashreevatsav@gmail.com')" class="w-full flex items-center justify-between p-3.5 border border-gray-300 rounded-lg hover:bg-gray-50 text-left transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-blue-600 text-white font-bold flex items-center justify-center">
            A
          </div>
          <div>
            <div class="text-sm font-semibold text-gray-800">Aditya Shreevatsav</div>
            <div class="text-xs text-gray-500">adityashreevatsav@gmail.com</div>
          </div>
        </div>
        <div class="text-xs text-blue-600 font-medium">Logged in</div>
      </button>

      <!-- Custom Account Option -->
      <div id="custom-account-section" class="border border-gray-200 rounded-lg p-3 bg-gray-50">
        <button onclick="toggleCustomForm()" class="w-full flex items-center gap-3 text-left hover:text-gray-900 transition-colors">
          <div class="w-9 h-9 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
          </div>
          <span class="text-sm text-gray-700 font-medium" id="custom-btn-text">Use another account</span>
        </button>

        <form id="custom-form" onsubmit="handleCustomSubmit(event)" class="hidden mt-3 space-y-3 pt-3 border-t border-gray-200">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Full Name</label>
            <input type="text" id="custom-name" placeholder="John Doe" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" required>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Email Address</label>
            <input type="email" id="custom-email" placeholder="john.doe@gmail.com" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" required>
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-xs py-2 rounded transition-colors">
            Sign In with custom details
          </button>
        </form>
      </div>

    </div>

    <!-- Disclosure -->
    <p class="text-xs text-gray-500 text-center leading-relaxed mt-2">
      To continue, Google will share your name, email address, language preference, and profile picture with HealthifyYou. See our <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a> and <a href="#" class="text-blue-600 hover:underline">Terms of Service</a>.
    </p>
  </div>

  <script>
    function selectAccount(name, email) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'GOOGLE_SIGNIN_SUCCESS',
          user: {
            name: name,
            email: email,
            picture: `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(name)}`
          }
        }, '*');
        window.close();
      } else {
        alert("This window was not opened by HealthifyYou. Sign-in simulated successfully.");
      }
    }

    function toggleCustomForm() {
      const form = document.getElementById('custom-form');
      const btnText = document.getElementById('custom-btn-text');
      if (form.classList.contains('hidden')) {
        form.classList.remove('hidden');
        btnText.innerText = "Cancel custom account";
      } else {
        form.classList.add('hidden');
        btnText.innerText = "Use another account";
      }
    }

    function handleCustomSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('custom-name').value;
      const email = document.getElementById('custom-email').value;
      selectAccount(name, email);
    }
  </script>
</body>
</html>
